  - generic [ref=e49]:
    - generic [ref=e50]: 01 / LE PRODUIT
    - heading "Quatre modules, indépendants. Vous activez ce que vous utilisez." [level=2] [ref=e51]
    - paragraph [ref=e52]: Chaque module fonctionne seul ou avec les autres. Pas de bundle imposé, pas de fonctionnalité que vous payez sans jamais ouvrir.
    - generic [ref=e53]:
      - generic [ref=e54]:
        - generic [ref=e55]: "01"
        - generic [ref=e56]: MENU & QR
        - paragraph [ref=e57]: Un menu digital soigné, un QR code par table, un mini-site qui reflète votre maison.
      - generic [ref=e58]:
        - generic [ref=e59]: "02"
        - generic [ref=e60]: COMMANDE EN LIGNE
        - paragraph [ref=e61]: Click-and-collect et commande sur place. Paiement intégré. Vos commandes arrivent sur votre téléphone.
      - generic [ref=e62]:
        - generic [ref=e63]: "03"
        - generic [ref=e64]: FIDÉLITÉ
        - paragraph [ref=e65]: Une carte de fidélité au numéro de téléphone. Simple, respectée, sans application à télécharger.
      - generic [ref=e66]:
        - generic [ref=e67]: "04"
        - generic [ref=e68]: ANALYSES
        - paragraph [ref=e69]: Votre chiffre, vos produits qui marchent, vos heures fortes. Lisible en un coup d'œil.
  - generic [ref=e71]:
    - generic [ref=e72]: 02 / LE MODÈLE
    - heading "Vos commandes, votre argent." [level=2] [ref=e73]
    - paragraph [ref=e74]: Quickarte fonctionne avec un abonnement mensuel. Rien d'autre. Aucune commission sur vos ventes, aucun pourcentage sur vos commandes. Ce que vos clients paient chez vous reste chez vous.
    - generic [ref=e75]:
      - generic [ref=e76]:
        - generic [ref=e77]: "01"
        - generic [ref=e78]: UN ABONNEMENT MENSUEL
        - paragraph [ref=e79]: Vous payez pour les modules que vous activez. Un tarif mensuel, établi ensemble. Aucun engagement long, aucun palier forcé.
        - paragraph [ref=e81]: Vous pouvez commencer avec un seul module et ajouter les autres quand vous voulez. Aucune re-configuration, aucun plan à migrer.
      - generic [ref=e82]:
        - generic [ref=e83]: "02"
        - generic [ref=e84]: ZÉRO COMMISSION
        - paragraph [ref=e85]: Nous ne prélevons rien sur vos ventes. Pas sur la première commande, pas sur la millième. Nos revenus viennent de votre abonnement — uniquement.
        - paragraph [ref=e87]: Aucun frais de transaction prélevé par Quickarte.
      - generic [ref=e88]:
        - generic [ref=e89]: "03"
        - generic [ref=e90]: PAIEMENTS DIRECTS
        - paragraph [ref=e91]: Vos clients vous paient via Stripe. L'argent arrive sur votre compte bancaire. Nous n'en voyons pas un centime.
        - paragraph [ref=e93]: Stripe, notre prestataire de paiement, applique ses frais de traitement bancaire standard. Quickarte n'intervient pas dans cette relation.
  - generic [ref=e95]:
    - generic [ref=e96]: 03 / POURQUOI QUICKARTE
    - heading "Moins de fonctionnalités, mieux faites." [level=2] [ref=e97]
    - paragraph [ref=e98]: "Le marché français est bruyant et chargé. Quickarte prend le contre-pied : un outil court, soigné, opinionné, que vos clients remarquent et que vous gardez ouvert sans y penser."
    - generic [ref=e99]:
      - generic [ref=e100]:
        - generic [ref=e101]: "01"
        - generic [ref=e102]: SIMPLICITÉ
        - paragraph [ref=e103]: Pensé pour être utile, pas pour faire la liste. Un menu en ligne en cinq minutes, une commande qui arrive sur votre téléphone, un rapport de fin de journée que vous lisez vraiment. Rien d'autre.
      - generic [ref=e104]:
        - generic [ref=e105]: "02"
        - generic [ref=e106]: ESTHÉTIQUE
        - paragraph [ref=e107]: Votre menu digital mérite d'être aussi soigné que votre vitrine. Tout ce que vos clients voient — storefront, QR, page de commande — est dessiné avec la même exigence que vos produits.
      - generic [ref=e108]:
        - generic [ref=e109]: "03"
        - generic [ref=e110]: MODULARITÉ
        - paragraph [ref=e111]: Quatre modules indépendants. Vous activez ce qui compte pour vous, et rien d'autre. Chaque module tient debout seul et s'assemble proprement avec les autres.
  - generic [ref=e114]:
